<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- 钱包/金融图标 -->
  <g fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- 外圆 -->
    <circle cx="256" cy="256" r="160" opacity="0.3" />
    
    <!-- 人民币符号简化版 -->
    <path d="M192 192 L256 256 L320 192" />
    <path d="M256 256 L256 336" />
    <path d="M208 304 L304 304" />
    <path d="M208 336 L304 336" />
  </g>
</svg>
